# App
spring.application.name=flownest-api
server.port=8080

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/flownest_db
spring.datasource.username=flownest_user
spring.datasource.password=flownest123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Flyway (DB migrations)
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# JWT Secret
app.jwt.secret=flownest-super-secret-key-change-in-production-2025
app.jwt.expiration-ms=86400000